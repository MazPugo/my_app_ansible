name: Ansible CI/CD

on:
  push:
    branches: [main]

jobs:

  # Stage 1: Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint playbook.yml

  # Stage 2: Dry run
  dry-run:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Create inventory file
        run: |
          mkdir -p inventory/production
          echo "[web]" > inventory/production/hosts.ini
          echo "${{ secrets.SERVER_IP }} ansible_user=marzena ansible_ssh_private_key_file=~/.ssh/id_ed25519" >> inventory/production/hosts.ini

      - name: Create vault password file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Create ansible.cfg
        run: |
          cat > ansible.cfg << EOF
          [defaults]
          inventory = inventory/production/hosts.ini
          host_key_checking = False
          remote_user = marzena
          roles_path = roles
          vault_password_file = ~/.vault_pass

          [privilege_escalation]
          become = True
          become_method = sudo
          become_user = root
          become_ask_pass = False

          [ssh_connection]
          pipelining = True
          EOF

      - name: Dry run playbook
        run: ansible-playbook playbook.yml --check

  # Stage 3: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: dry-run
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Create inventory file
        run: |
          mkdir -p inventory/production
          echo "[web]" > inventory/production/hosts.ini
          echo "${{ secrets.SERVER_IP }} ansible_user=marzena ansible_ssh_private_key_file=~/.ssh/id_ed25519" >> inventory/production/hosts.ini

      - name: Create vault password file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Create ansible.cfg
        run: |
          cat > ansible.cfg << EOF
          [defaults]
          inventory = inventory/production/hosts.ini
          host_key_checking = False
          remote_user = marzena
          roles_path = roles
          vault_password_file = ~/.vault_pass

          [privilege_escalation]
          become = True
          become_method = sudo
          become_user = root
          become_ask_pass = False

          [ssh_connection]
          pipelining = True
          EOF

      - name: Run playbook
        run: ansible-playbook playbook.yml



