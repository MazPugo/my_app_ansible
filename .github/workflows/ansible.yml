name: Ansible CI/CD

on:
  push:
    branches: [main]

jobs:

  # Stage 1: Lint only
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint playbook.yml
