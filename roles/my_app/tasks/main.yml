---
- name: Update apt
  ansible.builtin.apt:
    update_cache: true
  tags:
    - install

- name: Install required packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - nginx
      - docker.io
    state: present
  tags:
    - install

- name: Add marzena to docker group
  ansible.builtin.user:
    name: marzena
    groups: docker
    append: true
  tags:
    - install

- name: Start and enable Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  tags:
    - install

- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  tags:
    - install

- name: Configure firewall
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
  loop: "{{ allowed_ports }}"
  tags:
    - security

- name: Enable UFW
  community.general.ufw:
    state: enabled
  tags:
    - security

- name: Configure Nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/my_app
    mode: "0644"
  notify: Restart nginx
  tags:
    - nginx

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx
  tags:
    - nginx

- name: Enable Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/my_app
    dest: /etc/nginx/sites-enabled/my_app
    state: link
  notify: Restart nginx
  tags:
    - nginx

- name: Clone app from GitHub
  ansible.builtin.git:
    repo: "{{ my_app_github_repo }}"
    dest: "{{ my_app_dir }}"
    version: main
  become: true
  become_user: marzena
  tags:
    - deploy

- name: Build Docker image
  ansible.builtin.command:
    cmd: docker build -t {{ my_app_docker_image }} {{ my_app_dir }}
  changed_when: true
  tags:
    - deploy

- name: Stop existing container
  ansible.builtin.command:
    cmd: docker stop {{ my_app_name }}
  failed_when: false
  changed_when: true
  tags:
    - deploy

- name: Remove existing container
  ansible.builtin.command:
    cmd: docker rm {{ my_app_name }}
  failed_when: false
  changed_when: true
  tags:
    - deploy

- name: Run Docker container
  ansible.builtin.command:
    cmd: >
      docker run -d
      -p {{ my_app_port }}:{{ my_app_port }}
      --name {{ my_app_name }}
      --restart always
      {{ my_app_docker_image }}
  changed_when: true
  tags:
    - deploy
